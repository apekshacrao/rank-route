<!-- predictor page -->
 <!DOCTYPE html>
<html>
<head>

<title>Predict Colleges</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container mt-5">

<h2>KCET Rank Predictor</h2>

<form id="predictForm">

<input type="number" class="form-control mb-3" placeholder="KCET Rank">

<select class="form-control mb-3">
<option>GM</option>
<option>OBC</option>
<option>SC/ST</option>
</select>

<select class="form-control mb-3">
<option>CSE</option>
<option>ISE</option>
<option>ECE</option>
<option>AIML</option>
</select>

<button type="button" onclick="predict()" class="btn btn-primary">
Predict Colleges
</button>

</form>

<div id="result" class="mt-4"></div>

</div>

<script src="js/script.js"></script>

</body>
</html>
