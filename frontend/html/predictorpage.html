<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rank Predictor</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="/css/style.css">
</head>

<body>
<div class="app-shell">
	<aside class="app-sidebar">
		<div class="brand-wrap">
			<div class="brand-icon"><i class="bi bi-graph-up-arrow"></i></div>
			<div>
				<div class="brand-title">RANK ROUTE</div>
				<div class="brand-subtitle">AI College Predictor</div>
			</div>
		</div>

		<nav class="sidebar-nav">
			<a class="nav-item" href="/html/dashboard.html"><i class="bi bi-house-door"></i>Dashboard</a>
			<a class="nav-item active" href="/html/predictorpage.html"><i class="bi bi-search"></i>Rank Predictor</a>
			<a class="nav-item" href="/html/crashcourse.html"><i class="bi bi-play-circle"></i>Crash Course</a>
			<a class="nav-item" href="/html/mocktest.html"><i class="bi bi-journal-check"></i>Mock Test</a>
			<a class="nav-item" href="/html/comparison.html"><i class="bi bi-mortarboard"></i>Results</a>
			<a class="nav-item" href="/html/analytics.html"><i class="bi bi-bar-chart"></i>Analytics</a>
		</nav>

		<div class="sidebar-footer">
			<a class="nav-item" href="/html/login.html"><i class="bi bi-box-arrow-right"></i>Sign Out</a>
		</div>
	</aside>

	<main class="content-area">
		<div class="page-toolbar">
			<button class="sidebar-toggle" type="button" aria-label="Open menu"><i class="bi bi-list"></i></button>
		</div>
		<h1 class="page-title">Rank Predictor</h1>
		<p class="page-subtitle">Enter your profile to generate likely college options.</p>

		<section class="panel-card">
			<form id="predictForm">
				<div class="mb-3">
					<label for="collegeInput" class="form-label">Preferred College (Optional)</label>
					<input id="collegeInput" type="text" class="form-control" placeholder="Example: RV College of Engineering">
				</div>

				<div class="mb-3">
					<label for="rankInput" class="form-label">KCET Rank</label>
					<input id="rankInput" type="number" class="form-control" placeholder="Example: 3500" required>
				</div>

				<div class="mb-3">
					<label for="categoryInput" class="form-label">Category</label>
					<select id="categoryInput" class="form-select" required>
						<option>GM</option>
						<option>OBC</option>
						<option>SC/ST</option>
					</select>
				</div>

				<div class="mb-3">
					<label for="branchInput" class="form-label">Preferred Branch</label>
					<select id="branchInput" class="form-select" required>
						<option>CSE</option>
						<option>ISE</option>
						<option>ECE</option>
						<option>AIML</option>
					</select>
				</div>

				<button type="submit" class="btn btn-primary">Predict Colleges</button>
			</form>
		</section>

		<div id="predictStatus" class="mt-3"></div>
		<div id="result" class="mt-4 panel-card"></div>
		<section id="aiPredictorResult" class="mt-4 panel-card">
			<h2 class="section-heading"><i class="bi bi-cpu"></i>AI Predictor Analysis</h2>
			<div id="aiSuitabilityBadge" class="ai-suitability-badge"></div>
			<p id="aiSuitabilityText" class="ai-suitability-text"></p>

			<div class="ai-insight-grid">
				<article class="ai-insight-card">
					<h3>AI Suggestions</h3>
					<div id="aiSuggestionList" class="ai-list"></div>
				</article>
				<article class="ai-insight-card">
					<h3>Best Fit Branches</h3>
					<div id="aiBranchList" class="ai-list"></div>
				</article>
			</div>
		</section>
	</main>
</div>

<script src="/js/script.js"></script>
</body>
</html>
