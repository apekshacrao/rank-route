<!-- create signup -->
 <!DOCTYPE html>
<html>
<head>

<title>Signup</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="/css/style.css">

</head>

<body class="bg-light">

<div class="container login-box">

<div class="card shadow p-4">

<h3 class="text-center">Create Account</h3>

<form id="signupForm">

<input id="signupName" class="form-control mb-3" placeholder="Name" required>

<input id="signupEmail" class="form-control mb-3" placeholder="Email" required>

<input id="signupPassword" type="password" class="form-control mb-3" placeholder="Password" required>

<button type="submit" class="btn btn-success w-100">Signup</button>

</form>

<div id="signupStatus" class="mt-2"></div>

</div>

</div>

<script src="/js/script.js"></script>

</body>
</html>
