<!-- login page -->
 <!DOCTYPE html>
<html>
<head>

<title>Login</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="/css/style.css">

</head>

<body class="bg-light">

<div class="container login-box">

<div class="card shadow p-4">

<h3 class="text-center">Login</h3>

<form id="loginForm">

<input id="loginEmail" class="form-control mb-3" placeholder="Email" required>

<input id="loginPassword" type="password" class="form-control mb-3" placeholder="Password" required>

<button type="submit" class="btn btn-primary w-100">Login</button>

<p class="text-center mt-3">
No account? <a href="/html/signup.html">Signup</a>
</p>

</form>

<div id="loginStatus" class="mt-2"></div>

</div>

</div>

<script src="/js/script.js"></script>

</body>
</html>
